<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studify</title>

<style>
body {
  margin: 0;
  font-family: 'Inter', Arial, sans-serif;
  background: linear-gradient(135deg, #2c003e, #5a0f4d, #a83279, #ff6a3d);
  color: white;
}

nav {
  display: flex;
  justify-content: space-around;
  padding: 15px;
  background: rgba(0,0,0,0.4);
}

nav button {
  background: none;
  border: none;
  color: white;
  cursor: pointer;
}

.page { display:none; padding:40px; max-width:1000px; margin:auto; }
.page.active { display:block; }

.box {
  background: rgba(255,255,255,0.08);
  padding: 25px;
  border-radius: 20px;
  margin-top: 20px;
}

textarea, input {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-top:10px;
}

button.main {
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#6366f1;
  color:white;
  cursor:pointer;
}

#time { font-size:48px; text-align:center; }
.progress { height:6px; background:#333; }
.progress-bar { height:100%; width:0%; background:#22c55e; }
</style>
</head>

<body>

<nav>
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('timer')">Timer</button>
<button onclick="showPage('notes')">Summarizer</button>
<button onclick="showPage('planner')">Planner</button>
<button onclick="showPage('tools')">Tools</button>
</nav>

<!-- HOME -->
<div id="home" class="page active">
<h1>Welcome to Studify</h1>

<div class="box">
<h3>🔥 Study Streak</h3>
<p id="dashStreak"></p>

<h3>⏳ Sessions Completed</h3>
<p id="sessions">0</p>
</div>

<div class="box">
<p>All-in-one study system.</p>
</div>

<div class="box">
<h3>Privacy Policy</h3>
<p>This site may use cookies and third-party services like ads.</p>
</div>

</div>

<!-- TIMER -->
<div id="timer" class="page">
<div class="box">
<input id="mins">
<button class="main" onclick="startTimer()">Start</button>
<h1 id="time">00:00</h1>
<div class="progress"><div id="bar" class="progress-bar"></div></div>
</div>
</div>

<!-- SUMMARIZER -->
<div id="notes" class="page">
<div class="box">
<textarea id="text"></textarea>
<button class="main" onclick="summarize()">Summarize</button>
<p id="result"></p>
</div>
</div>

<!-- PLANNER -->
<div id="planner" class="page">
<div class="box">
<textarea id="plan"></textarea>
<button class="main" onclick="makePlan()">Generate</button>
<p id="planOut"></p>
</div>
</div>

<!-- TOOLS -->
<div id="tools" class="page">
<div class="box">

<h3>💬 Motivation</h3>
<button class="main" onclick="quote()">Get Quote</button>
<p id="quote"></p>

<h3>📝 Tasks</h3>
<input id="taskInput">
<button class="main" onclick="addTask()">Add</button>
<ul id="tasks"></ul>

<h3>🎯 Goal</h3>
<input id="goalInput">
<button class="main" onclick="setGoal()">Save</button>
<p id="goal"></p>

<!-- NEW FEATURE 1 -->
<h3>📚 Flashcards</h3>
<input id="q" placeholder="Question">
<input id="a" placeholder="Answer">
<button class="main" onclick="addCard()">Add Card</button>
<div id="cards"></div>

<!-- NEW FEATURE 2 -->
<h3>⏳ Sessions Completed</h3>
<p id="sessionCount"></p>

</div>
</div>

<script>

/* NAV */
function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* TIMER + SESSION TRACK */
let timer;
function startTimer(){
  let m=parseInt(mins.value);
  if(!m||m<=0) return;

  let t=m*60,l=t;
  clearInterval(timer);

  timer=setInterval(()=>{
    l--;
    time.innerText=Math.floor(l/60)+":"+("0"+l%60).slice(-2);
    bar.style.width=((t-l)/t)*100+"%";

    if(l<=0){
      clearInterval(timer);
      let s=parseInt(localStorage.sessions||0)+1;
      localStorage.sessions=s;
      updateSessions();
    }
  },1000);
}

/* SESSION DISPLAY */
function updateSessions(){
  let s=localStorage.sessions||0;
  sessionCount.innerText=s;
  sessions.innerText=s;
}
updateSessions();

/* SUMMARIZER */
function summarize(){
  let t=text.value.trim();
  result.innerText=t?t.split(". ").slice(0,3).join(". "):"";
}

/* PLANNER */
function makePlan(){
  let arr=plan.value.split(",");
  planOut.innerHTML=arr.map((s,i)=>"Day "+(i+1)+": "+s).join("<br>");
}

/* TASKS */
let tasks=JSON.parse(localStorage.tasks||"[]");
function renderTasks(){
  tasksEl.innerHTML="";
  tasks.forEach((t,i)=>tasksEl.innerHTML+=`<li>${t} <button onclick="delTask(${i})">❌</button></li>`);
}
function addTask(){
  if(!taskInput.value.trim()) return;
  tasks.push(taskInput.value);
  localStorage.tasks=JSON.stringify(tasks);
  taskInput.value="";
  renderTasks();
}
function delTask(i){
  tasks.splice(i,1);
  localStorage.tasks=JSON.stringify(tasks);
  renderTasks();
}
document.addEventListener("keypress",e=>{
  if(e.key==="Enter") addTask();
});
renderTasks();

/* GOAL */
goal.innerText=localStorage.goal||"";
function setGoal(){
  localStorage.goal=goalInput.value;
  goal.innerText=goalInput.value;
}

/* STREAK */
let today=new Date().toDateString();
let last=localStorage.last;
if(last!==today){
  let s=parseInt(localStorage.streak||"0");
  let y=new Date(); y.setDate(y.getDate()-1);
  s=(last===y.toDateString())?s+1:1;
  localStorage.streak=s;
  localStorage.last=today;
}
dashStreak.innerText=localStorage.streak||0;

/* QUOTE */
function quote(){
  let q=["Stay focused","Keep going","Discipline wins","You got this"];
  quote.innerText=q[Math.floor(Math.random()*q.length)];
}

/* FLASHCARDS */
let cards=JSON.parse(localStorage.cards||"[]");

function renderCards(){
  cardsDiv.innerHTML="";
  cards.forEach((c,i)=>{
    cardsDiv.innerHTML+=`<div onclick="flip(${i})">${c.q}</div>`;
  });
}

function addCard(){
  if(!q.value||!a.value) return;
  cards.push({q:q.value,a:a.value,show:false});
  localStorage.cards=JSON.stringify(cards);
  q.value="";a.value="";
  renderCards();
}

function flip(i){
  cards[i].show=!cards[i].show;
  cardsDiv.children[i].innerText=cards[i].show?cards[i].a:cards[i].q;
}

let cardsDiv=document.getElementById("cards");
renderCards();

</script>

</body>
</html>
