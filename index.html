<!DOCTYPE html>
<html>
<head>
<title>Studiq - FINAL UPGRADE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  background:
  radial-gradient(circle at 20px 20px, rgba(255,255,255,0.08) 2px, transparent 3px),
  radial-gradient(circle at 60px 60px, rgba(255,255,255,0.08) 2px, transparent 3px),
  linear-gradient(135deg,#020617,#1e3a8a,#0f172a);
  background-size:80px 80px,80px 80px,100% 100%;
}
nav{display:flex;justify-content:space-around;background:#000;padding:10px}
button{cursor:pointer;padding:8px;border:none;border-radius:6px;margin:3px}
.page{display:none;padding:20px}
.active{display:block}
.box{background:rgba(255,255,255,0.1);padding:15px;margin-top:10px;border-radius:10px}
canvas{background:black}
</style>
</head>
<body>

<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('tools')">Tools</button>
<button onclick="show('game')">Game</button>
</nav>

<div id="home" class="page active">
<h1>Studiq</h1>
<p id="quote"></p>
</div>

<div id="tools" class="page">
<div class="box">
<h3>20 Features</h3>
<input id="input" placeholder="Enter text or number">
<div id="btns"></div>
<p id="output"></p>
</div>
</div>

<div id="game" class="page">
<div class="box">
<h3>Flappy Bird</h3>
<canvas id="c" width="300" height="200"></canvas>
<p>Score: <span id="score">0</span></p>
</div>
</div>

<script>
function show(id){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

// QUOTE
let quotes=["Discipline wins","Focus up","Stay sharp","No excuses"];
document.getElementById('quote').innerText=quotes[Math.floor(Math.random()*quotes.length)];

// 20 FEATURES AUTO
let funcs=[
 v=>v.toUpperCase(),
 v=>v.toLowerCase(),
 v=>v.split('').reverse().join(''),
 v=>v.split(' ').length,
 v=>Math.floor(Math.random()*100),
 v=>Number(v)+10,
 v=>Number(v)-5,
 v=>Number(v)*2,
 v=>Number(v)/2,
 v=>Number(v)*Number(v),
 v=>v.length,
 v=>v[0],
 v=>v[v.length-1],
 v=>v.trim(),
 v=>v+v,
 v=>v.split(' ')[Math.floor(Math.random()*v.split(' ').length)],
 v=>v.charAt(0).toUpperCase()+v.slice(1),
 v=>v.replace(/ /g,''),
 v=>v+"!",
 v=>""
];

let btns=document.getElementById('btns');
funcs.forEach((f,i)=>{
 let b=document.createElement('button');
 b.innerText='Tool '+(i+1);
 b.onclick=()=>{
  let v=document.getElementById('input').value;
  document.getElementById('output').innerText=f(v);
 };
 btns.appendChild(b);
});

// FLAPPY BIRD
let c=document.getElementById('c');
let ctx=c.getContext('2d');
let birdY=100, vel=0, gravity=0.5;
let pipes=[], score=0;

document.addEventListener('keydown',()=>vel=-8);

function game(){
 ctx.clearRect(0,0,300,200);
 
 vel+=gravity;
 birdY+=vel;
 
 ctx.fillStyle='yellow';
 ctx.fillRect(50,birdY,15,15);
 
 if(Math.random()<0.02){
  let h=Math.random()*100;
  pipes.push({x:300,top:h,bottom:h+40});
 }
 
 pipes.forEach(p=>{
  p.x-=2;
  ctx.fillStyle='green';
  ctx.fillRect(p.x,0,20,p.top);
  ctx.fillRect(p.x,p.bottom,20,200);
  
  if(p.x===50) score++;
 });
 
 document.getElementById('score').innerText=score;
 requestAnimationFrame(game);
}
game();
</script>

</body>
</html>
