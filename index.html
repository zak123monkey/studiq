<!DOCTYPE html>
<html>
<head>
<title>Studiq - Ultimate Study Platform</title>

<!-- GOOGLE ANALYTICS (REAL TRACKING) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-XXXXXXXXXX');
</script>

<style>
/* ================= GLOBAL STYLE ================= */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e3a8a, #020617);
  color: white;
  overflow-x: hidden;
}

/* Floating background design */
.shape {
  position: absolute;
  border-radius: 50%;
  opacity: 0.08;
  animation: float 15s infinite ease-in-out;
}

@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-80px); }
  100% { transform: translateY(0); }
}

/* Navigation */
nav {
  display: flex;
  justify-content: space-around;
  padding: 15px;
  background: rgba(0,0,0,0.4);
}

nav button {
  background: none;
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

/* Pages */
.page {
  display: none;
  padding: 40px;
  max-width: 1000px;
  margin: auto;
}
.active { display: block; }

/* Card UI */
.box {
  background: rgba(255,255,255,0.08);
  padding: 30px;
  border-radius: 20px;
  margin-top: 20px;
}

/* Inputs */
textarea, input {
  width: 100%;
  padding: 15px;
  border-radius: 12px;
  border: none;
  margin-top: 10px;
  font-size: 16px;
}

/* Buttons */
button.main {
  margin-top: 10px;
  padding: 15px;
  border-radius: 12px;
  border: none;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

button.main:hover {
  background: #2563eb;
}

/* Tools */
.tools button {
  width: 100%;
  padding: 16px;
  margin-top: 10px;
}

/* Game */
#gameCanvas {
  background: black;
  display: block;
  margin: auto;
}

/* VISITOR BOX */
.visitor-box {
  text-align: center;
  font-size: 20px;
  margin-top: 20px;
}
</style>
</head>

<body>

<!-- Background shapes -->
<div class="shape" style="width:300px;height:300px;background:#00f;top:10%;left:10%;"></div>
<div class="shape" style="width:250px;height:250px;background:#0ff;top:70%;left:80%;"></div>
<div class="shape" style="width:200px;height:200px;background:#f0f;top:50%;left:20%;"></div>

<!-- NAV -->
<nav>
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('timer')">Timer</button>
<button onclick="showPage('notes')">Summarizer</button>
<button onclick="showPage('planner')">Planner</button>
<button onclick="showPage('tools')">Tools</button>
</nav>

<!-- HOME -->
<div id="home" class="page active">
<h1>Welcome & Study</h1>

<div class="visitor-box">
👥 Visitors: <span id="visits">Counting...</span>
</div>

<div class="box">
<p>Welcome to Studiq — your all-in-one study system.</p>
</div>
</div>

<!-- TIMER -->
<div id="timer" class="page">
<div class="box">
<h2>⏱️ Study Timer</h2>
<input id="mins" placeholder="Enter minutes">
<button class="main" onclick="startTimer()">Start</button>
<h1 id="time">00:00</h1>
</div>
</div>

<!-- SUMMARIZER -->
<div id="notes" class="page">
<div class="box">
<h2>🧠 Summarizer</h2>
<textarea id="text"></textarea>
<button class="main" onclick="summarize()">Summarize</button>
<div id="result"></div>
</div>
</div>

<!-- PLANNER -->
<div id="planner" class="page">
<div class="box">
<textarea id="plan"></textarea>
<button onclick="makePlan()">Plan</button>
<div id="planOut"></div>
</div>
</div>

<!-- TOOLS -->
<div id="tools" class="page">
<div class="box tools">
<input id="taskInput">
<button onclick="addTask()">Add Task</button>
<ul id="tasks"></ul>
</div>
</div>

<script>

/* NAV */
function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* TIMER */
let t,int;
function startTimer(){
  let m=document.getElementById("mins").value;
  t=m*60;
  clearInterval(int);
  int=setInterval(()=>{
    let min=Math.floor(t/60);
    let sec=t%60;
    document.getElementById("time").innerText=min+":"+(sec<10?"0":"")+sec;
    t--;
  },1000);
}

/* SUMMARIZER */
function summarize(){
  let text=document.getElementById("text").value;
  let summary=text.split(".").slice(0,3).join(".");
  document.getElementById("result").innerHTML=summary;
}

/* PLANNER */
function makePlan(){
  let t=document.getElementById("plan").value.split(",");
  let out="";
  t.forEach((d,i)=>{out+="Day "+(i+1)+": "+d+"<br>";});
  document.getElementById("planOut").innerHTML=out;
}

/* TASKS */
let tasks=JSON.parse(localStorage.getItem("tasks"))||[];

function render(){
  let list=document.getElementById("tasks");
  list.innerHTML="";
  tasks.forEach((t,i)=>{
    let li=document.createElement("li");
    li.innerHTML=t+" <button onclick='del("+i+")'>X</button>";
    list.appendChild(li);
  });
}
function addTask(){
  let t=document.getElementById("taskInput").value;
  tasks.push(t);
  localStorage.setItem("tasks",JSON.stringify(tasks));
  render();
}
function del(i){
  tasks.splice(i,1);
  localStorage.setItem("tasks",JSON.stringify(tasks));
  render();
}
render();

/* VISITOR COUNTER (LOCAL FALLBACK) */
let count = localStorage.getItem("visits") || 0;
count++;
localStorage.setItem("visits", count);
document.getElementById("visits").innerText = count;

</script>

</body>
</html>
