<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studiq - Fully Working</title>
<style>
body{font-family:Arial;background:#0f172a;color:#fff;margin:0}
nav{display:flex;justify-content:space-around;padding:15px;background:#111827}
nav button{background:none;border:none;color:#ccc;font-size:16px;cursor:pointer}
nav button:hover{color:#fff}
.page{display:none;padding:30px;text-align:center}
.active{display:block}
button.main{padding:10px 20px;margin:10px;border:none;border-radius:8px;background:#3b82f6;color:white;cursor:pointer}
input,textarea{width:80%;padding:10px;margin:10px;border-radius:8px;border:none}
li{margin:5px 0}
</style>
</head>
<body>

<nav>
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('timer')">Timer</button>
<button onclick="showPage('planner')">Planner</button>
<button onclick="showPage('notes')">Summarizer</button>
</nav>

<div id="home" class="page active">
<h1>Welcome to Studiq</h1>
<p>Everything works now. Start studying.</p>
<button class="main" onclick="showPage('timer')">Start Study</button>
<br>
<img src="https://c.statcounter.com/13212872/0/14c16a4e/1/">
</div>

<div id="timer" class="page">
<h2>Study Timer</h2>
<input id="mins" placeholder="Enter minutes">
<button class="main" onclick="startTimer()">Start</button>
<button class="main" onclick="pauseTimer()">Pause</button>
<button class="main" onclick="resetTimer()">Reset</button>
<h1 id="time">00:00</h1>
</div>

<div id="planner" class="page">
<h2>Planner</h2>
<input id="taskInput" placeholder="Add task">
<button class="main" onclick="addTask()">Add</button>
<ul id="tasks"></ul>
</div>

<div id="notes" class="page">
<h2>Summarizer</h2>
<textarea id="text" placeholder="Paste notes"></textarea>
<button class="main" onclick="summarize()">Summarize</button>
<p id="result"></p>
</div>

<script>
// NAVIGATION (FIXED)
function showPage(id){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

// TIMER (FIXED)
let t=0, interval;
function startTimer(){
 let m=parseInt(document.getElementById('mins').value);
 if(isNaN(m)||m<=0){alert('Enter valid minutes');return;}
 t=m*60;
 clearInterval(interval);
 interval=setInterval(()=>{
  if(t<=0){clearInterval(interval);return;}
  t--;
  updateTime();
 },1000);
}
function pauseTimer(){clearInterval(interval)}
function resetTimer(){clearInterval(interval);t=0;updateTime();}
function updateTime(){
 let min=Math.floor(t/60),sec=t%60;
 document.getElementById('time').innerText=`${min}:${sec<10?'0':''}${sec}`;
}

// PLANNER (WORKING + SAVES)
let tasks=JSON.parse(localStorage.getItem('tasks')||'[]');
function render(){
 let list=document.getElementById('tasks');
 list.innerHTML='';
 tasks.forEach((task,i)=>{
  let li=document.createElement('li');
  li.innerHTML=task+" <button onclick='del("+i+")'>X</button>";
  list.appendChild(li);
 });
}
function addTask(){
 let input=document.getElementById('taskInput');
 if(!input.value) return;
 tasks.push(input.value);
 localStorage.setItem('tasks',JSON.stringify(tasks));
 input.value='';
 render();
}
function del(i){
 tasks.splice(i,1);
 localStorage.setItem('tasks',JSON.stringify(tasks));
 render();
}
render();

// SUMMARIZER (WORKING)
function summarize(){
 let text=document.getElementById('text').value;
 if(!text) return;
 let sentences=text.split('.');
 document.getElementById('result').innerText=sentences.slice(0,3).join('.')+'.';
}
</script>

</script>

</body>
</html>
